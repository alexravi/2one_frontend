name: Build and deploy Next.js app to Azure Web App - toneWeb

on:
  push:
    branches:
      - production
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      # 3. (Optional) Install dependencies just to validate build
      # This step helps catch errors early, but Azure will rebuild anyway
      - name: Install dependencies
        run: npm ci

      # 4. (Optional) Test build locally in CI
      - name: Verify build
        run: npm run build

      # 5. Login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E32D484CA7B94187AD3089F876F3C4AA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CBF3AEC9E4854B39B4EBCBB597A19584 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EE3C4B1E911D4A23AD77B58893C89387 }}

      # 6. Deploy full source (NO node_modules, NO .next)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'toneWeb'
          slot-name: 'Production'
          package: .
